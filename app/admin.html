<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeAlert | Admin</title>

    <link rel="stylesheet" href="style.css">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>

<div class="container-admin">
    <div class="header-row">
        <div>
            <h2>Painel de monitoramento</h2>
            <p class="subtitle">Clique na ocorrência para ações</p>
        </div>
        <button onclick="logout()">Sair</button>
    </div>

    <p id="status"></p>

    <!-- MAPA -->
    <div id="map" style="height: 400px; margin-bottom: 20px;"></div>

    <!-- LISTA -->
    <div id="lista-emergencias"></div>
</div>

<script src="script.js"></script>

<script>
let map = L.map('map').setView([-23.5505, -46.6333], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

let markers = [];

// 🔎 endereço
async function buscarEndereco(lat, lon) {
    try {
        const res = await fetch(
            `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
        );
        const data = await res.json();
        return data.display_name || "Endereço não encontrado";
    } catch {
        return "Erro ao buscar endereço";
    }
}

// 🚀 ações ao clicar
function abrirOpcoes(lat, lon, telefone) {
    const escolha = confirm(
        "Escolha uma ação:\n\nOK = 📍 Ver rota\nCancelar = 📞 Ligar"
    );

    if (escolha) {
        window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`);
    } else {
        window.location.href = `tel:${telefone}`;
    }
}

// 🚨 carregar lista
async function carregarLista() {
    const status = document.getElementById("status");
    const lista = document.getElementById("lista-emergencias");

    try {
        const alertas = await carregarEmergencias();

        lista.innerHTML = "";
        markers.forEach(m => map.removeLayer(m));
        markers = [];

        if (!alertas.length) {
            status.textContent = "Nenhuma emergência.";
            return;
        }

        status.textContent = `${alertas.length} emergência(s).`;

        let bounds = [];

        for (const alerta of alertas) {

            const nome = alerta.usuario?.nome || "Não informado";
            const telefone = alerta.usuario?.telefone || "";
            const endereco = await buscarEndereco(alerta.latitude, alerta.longitude);

            // 🧱 CARD CLICÁVEL
            lista.innerHTML += `
                <div class="card-alerta" style="
                    background:#1f2a38;
                    padding:15px;
                    margin-bottom:10px;
                    border-radius:10px;
                    cursor:pointer;
                "
                onclick="abrirOpcoes(${alerta.latitude}, ${alerta.longitude}, '${telefone}')">

                    <strong>ID ${alerta.id}</strong><br>
                    👤 Nome: ${nome}<br>
                    📞 Telefone: ${telefone}<br>
                    📍 ${endereco}<br>
                    Status: ${alerta.status}
                </div>
            `;

            const marker = L.marker([alerta.latitude, alerta.longitude])
                .addTo(map)
                .bindPopup(`
                    <b>🚨 Emergência ${alerta.id}</b><br>
                    👤 ${nome}<br>
                    📞 ${telefone}<br>
                    📍 ${endereco}
                `);

            markers.push(marker);
            bounds.push([alerta.latitude, alerta.longitude]);
        }

        if (bounds.length > 0) {
            map.fitBounds(bounds);
        }

    } catch (error) {
        status.textContent = "Erro ao carregar.";
    }
}

// 🔐 proteção
if (protegerPagina("admin", "monitor")) {
    carregarLista();
    setInterval(carregarLista, 5000);
}
</script>

</body>
</html>
