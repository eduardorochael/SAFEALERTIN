<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>SafeAlert | Admin</title>

    <link rel="stylesheet" href="style.css">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>

<body>

<div class="container-admin">

    <div class="header-row">
        <h2>Painel de Monitoramento</h2>
        <button onclick="logout()">Sair</button>
    </div>

    <div class="layout">

        <!-- ESQUERDA -->
        <div class="lista">
            <p id="status"></p>
            <div id="lista-emergencias"></div>
        </div>

        <!-- DIREITA -->
        <div class="mapa-box">
            <div id="map"></div>
        </div>

    </div>

</div>

<script src="script.js"></script>

<script>
// 🔥 MAPA
let map = L.map('map').setView([-23.5505, -46.6333], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

let markers = [];

// 📍 endereço
async function buscarEndereco(lat, lon) {
    try {
        const res = await fetch(
            `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
        );
        const data = await res.json();
        return data.display_name || "Endereço não encontrado";
    } catch {
        return "Erro ao buscar endereço";
    }
}

// 📞 ligar
function ligar(telefone) {
    if (!telefone || telefone === "Não informado") {
        alert("Telefone não disponível");
        return;
    }
    window.location.href = `tel:${telefone}`;
}

// 📍 rota
function rota(lat, lon) {
    window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`);
}

// 🚨 carregar lista
async function carregarLista() {
    const status = document.getElementById("status");
    const lista = document.getElementById("lista-emergencias");

    try {
        const alertas = await carregarEmergencias();

        lista.innerHTML = "";
        markers.forEach(m => map.removeLayer(m));
        markers = [];

        if (!alertas.length) {
            status.textContent = "Nenhuma emergência.";
            return;
        }

        status.textContent = `${alertas.length} emergência(s).`;

        let bounds = [];

        for (const alerta of alertas) {

            const nome = alerta.usuario?.nome || "Não informado";
            const telefone = alerta.usuario?.telefone || "Não informado";
            const endereco = await buscarEndereco(alerta.latitude, alerta.longitude);

            lista.innerHTML += `
                <div class="card-alerta">
                    <strong>ID ${alerta.id}</strong><br>

                    👤 ${nome}<br>
                    📞 ${telefone}<br>
                    📍 ${endereco}<br>
                    Status: ${alerta.status}<br>

                    <button class="btn-ligar" onclick="ligar('${telefone}')">
                        📞 Ligar
                    </button>

                    <button class="btn-rota" onclick="rota(${alerta.latitude}, ${alerta.longitude})">
                        📍 Rota
                    </button>
                </div>
            `;

            const marker = L.marker([alerta.latitude, alerta.longitude])
                .addTo(map)
                .bindPopup(`
                    <b>🚨 Emergência ${alerta.id}</b><br>
                    👤 ${nome}<br>
                    📞 ${telefone}<br>
                    📍 ${endereco}
                `);

            markers.push(marker);
            bounds.push([alerta.latitude, alerta.longitude]);
        }

        if (bounds.length > 0) {
            map.fitBounds(bounds);
        }

    } catch (error) {
        status.textContent = "Erro ao carregar.";
        console.error(error);
    }
}

// 🔐 proteção
if (protegerPagina("admin", "monitor")) {
    carregarLista();
    setInterval(carregarLista, 5000);
}
</script>

</body>
</html>
