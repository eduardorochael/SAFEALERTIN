<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>SafeAlert | Admin</title>

    <link rel="stylesheet" href="style.css">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <link rel="icon" href="static/img/fundo.png">
</head>
<body>

<div class="container-admin">

    <div class="header-row">
        <h2>Painel de Monitoramento</h2>
        <button onclick="logout()">Sair</button>
    </div>

    <p id="status"></p>

    <div class="layout-admin">

        <!-- 📋 OCORRÊNCIAS -->
        <div class="lista-ocorrencias" id="lista-emergencias"></div>

        <!-- 🗺️ MAPA -->
        <div class="mapa-container">
            <div id="map"></div>
        </div>

    </div>

</div>

<script>
// 🔥 MAPA
let map = L.map('map').setView([-23.5505, -46.6333], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

let markers = [];

// 📍 endereço
async function buscarEndereco(lat, lon) {
    try {
        const res = await fetch(
            `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
        );
        const data = await res.json();
        return data.display_name || "Endereço não encontrado";
    } catch {
        return "Erro ao buscar endereço";
    }
}

// 🚀 carregar dados
async function carregarLista() {
    const lista = document.getElementById("lista-emergencias");
    const status = document.getElementById("status");

    try {
        const res = await fetch("/emergencias"); // 🔥 IMPORTANTE
        const alertas = await res.json();

        lista.innerHTML = "";

        // limpa mapa
        markers.forEach(m => map.removeLayer(m));
        markers = [];

        if (!alertas.length) {
            status.textContent = "Nenhuma emergência.";
            return;
        }

        status.textContent = `${alertas.length} emergência(s).`;

        let bounds = [];

        for (const alerta of alertas) {

            const nome = alerta.usuario?.nome || "Não informado";
            const telefone = alerta.usuario?.telefone || "Não informado";

            const endereco = await buscarEndereco(alerta.latitude, alerta.longitude);

            // 📋 CARD
            lista.innerHTML += `
                <div class="card-alerta">
                    <strong>ID ${alerta.id}</strong><br>
                    👤 ${nome}<br>
                    📞 ${telefone}<br>
                    📍 ${endereco}<br>
                    Status: ${alerta.status}

                    <a class="btn-ligar" href="tel:${telefone}">📞 Ligar</a>

                    <a class="btn-rota" target="_blank"
                        href="https://www.google.com/maps?q=${alerta.latitude},${alerta.longitude}">
                        📍 Rota
                    </a>
                </div>
            `;

            // 🗺️ marcador
            const marker = L.marker([alerta.latitude, alerta.longitude])
                .addTo(map)
                .bindPopup(`
                    <b>${nome}</b><br>
                    📞 ${telefone}<br>
                    📍 ${endereco}
                `);

            markers.push(marker);
            bounds.push([alerta.latitude, alerta.longitude]);
        }

        if (bounds.length > 0) {
            map.fitBounds(bounds);
        }

    } catch (error) {
        status.textContent = "Erro ao carregar.";
        console.error(error);
    }
}

// 🔄 atualizar automático
carregarLista();
setInterval(carregarLista, 5000);
</script>

<script src="script.js"></script>

</body>
</html>
