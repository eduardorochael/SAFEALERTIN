<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>SafeAlert - Admin</title>

<link rel="stylesheet" href="style.css">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>

<body>

<div class="container-admin">

    <div class="header-row">
        <h2>Painel de Monitoramento</h2>
        <button onclick="logout()">Sair</button>
    </div>

    <p id="status"></p>

    <div class="layout-admin">

        <!-- 📋 LISTA -->
        <div id="lista-emergencias" class="lista-ocorrencias"></div>

        <!-- 🗺️ MAPA -->
        <div class="mapa-container">
            <div id="map"></div>
        </div>

    </div>

</div>

<script>
const API = "https://safealertin.onrender.com";

// 🗺️ MAPA
const map = L.map('map').setView([-23.5505, -46.6333], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

let markers = [];

// 📍 buscar endereço
async function buscarEndereco(lat, lon) {
    try {
        const res = await fetch(
            `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
        );
        const data = await res.json();
        return data.display_name || "Endereço não encontrado";
    } catch {
        return "Erro ao buscar endereço";
    }
}

// 📡 pegar emergências
async function carregarEmergencias() {
    const res = await fetch(`${API}/emergencias`);
    return await res.json();
}

// ✅ marcar como atendida
async function atender(id) {
    await fetch(`${API}/emergencias/${id}/atender`, {
        method: "PUT"
    });

    alert("Ocorrência atendida!");
    carregarLista();
}

// 🔥 carregar tudo
async function carregarLista() {
    const lista = document.getElementById("lista-emergencias");
    const status = document.getElementById("status");

    try {
        const dados = await carregarEmergencias();

        lista.innerHTML = "";

        markers.forEach(m => map.removeLayer(m));
        markers = [];

        if (!dados.length) {
            status.textContent = "Nenhuma emergência.";
            return;
        }

        status.textContent = `${dados.length} emergência(s).`;

        let bounds = [];

        for (const e of dados) {

            const nome = e.usuario?.nome || "Não informado";
            const tel = e.usuario?.telefone || "Não informado";

            const endereco = await buscarEndereco(e.latitude, e.longitude);

            lista.innerHTML += `
                <div class="card-alerta">
                    <strong>ID ${e.id}</strong><br>
                    👤 ${nome}<br>
                    📞 ${tel}<br>
                    📍 ${endereco}<br>
                    Status: ${e.status}<br>

                    <a class="btn-ligar" href="tel:${tel}">📞 Ligar</a>

                    <a class="btn-rota" target="_blank"
                       href="https://www.google.com/maps?q=${e.latitude},${e.longitude}">
                       📍 Rota
                    </a>

                    <button onclick="atender(${e.id})">
                        ✅ Atendida
                    </button>
                </div>
            `;

            const marker = L.marker([e.latitude, e.longitude])
                .addTo(map)
                .bindPopup(`
                    <b>🚨 ID ${e.id}</b><br>
                    ${nome}<br>
                    ${tel}<br>
                    ${endereco}<br>
                    Status: ${e.status}
                `);

            markers.push(marker);
            bounds.push([e.latitude, e.longitude]);
        }

        if (bounds.length) {
            map.fitBounds(bounds);
        }

    } catch (err) {
        status.textContent = "Erro ao carregar.";
    }
}

// logout simples
function logout() {
    window.location.href = "/app/login.html";
}

// iniciar
carregarLista();
setInterval(carregarLista, 5000);

</script>

</body>
</html>
